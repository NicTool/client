<!DOCTYPE HTML>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="NicTool Client UI" />
        <title>NicTool v3</title>
        <script type="module" src="./js/main.js">
        </script>
    </head>

    <body class="bg-dark-subtle" style="">

        <nav class="navbar navbar-expand-sm" data-bs-theme="dark" style="background-color: #336666; color: white;">
            <div class="container flex-row">
                <div class="col-1"><a class="navbar-brand" href="#" style="">NicTool</a></div>
                <div class="col-10 text-center">
                    <img src="/assets/logo.svg" alt="logo" class="navbar-brand" style="height: 2em; width: 2em; text-align: center;" />
                </div>
                <button class="navbar-toggler col-1" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav">
                    <li class="navbar-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">Profile</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Password</a></li>
                            <li><a class="dropdown-item" href="#">Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a id="logout_button" class="dropdown-item" href="#" type="button">Logout</a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </nav>

        <main>

            <div id="login_div" class="row row-cols-lg-auto g-2" style="border: red 0px solid; display: none;">
                <form id="login_form" action="" onsubmit="return false;" class="align-items-center" style="padding: 6em;">
                    <h3 class="text-center">Login</h3>
                    <div class="form-floating mb-3" style="border: yellow 1px solid;">
                        <input type="text" id="username" name="username" placeholder="name@example.com" class="form-control" required>
                        <label for="username" class="form-label">Username</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" class="form-control" aria-describedby="password-constraints" required>
                        <label for="password" class="form-label">Password</label>
                        <div id="password-constraints" style="font-size: .7em;">Minimums: 8 characters, 2 lower case, 2 upper case, 2 symbols, and 2 numbers.</div>
                    </div>
                    <div class="form-floating mb-3 text-center">
                        <button id="login_form_submit" type="submit">Login</button>
                    </div>
                </form>
            </div>

            <div id="loggedInMain" class="accordion accordion-flush" style="display: none;">

                <div id="groups" class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button" type="button"
                            data-bs-toggle="collapse" data-bs-target="#groups_div"
                            aria-expanded="false" aria-controls="groups_div">
                            Groups
                        </button>
                    </h2>
                    <div id="groups_div" class="accordion-collapse collapse" data-bs-parent="#loggedInMain">
                        <ul class="accordion-body" id="groups_ul">
                        </ul>    
                    </div>
                </div>

                <div id="nameservers" class="accordion-item">
                    <h4 class="accordion-header">
                        <button class="accordion-button" type="button"
                            data-bs-toggle="collapse" data-bs-target="#nameservers_div"
                            aria-expanded="false" aria-controls="nameservers_div">
                            Nameservers
                        </button>
                    </h4>
                    <div id="nameservers_div" class="accordion-collapse collapse" data-bs-parent="#loggedInMain">
                        <table id="ns_table" class="accordion-body col-11">
                            <tr>
                                <th style="text-align: left;">Name</th>
                                <th style="text-align: left;">Description</th>
                                <th style="text-align: right;">IPv4</th>
                                <th style="text-align: right;">IPv6</th>
                                <th style="text-align: center;">Format</th>
                                <th style="text-align: center;"></th>
                            </tr>
                        </table>
                    </div>
                </div>

                <div id="zones" class="accordian-item">
                    <h4 class="accordion-header">
                        <button class="accordion-button" type="button"
                        data-bs-toggle="collapse" data-bs-target="#zones_div"
                        aria-expanded="false" aria-controls="zones_div">
                        Zones
                        </button>
                    </h4>

                    <div id="zones_div" class="accordion-collapse collapse show" data-bs-parent="#loggedInMain">
                        <div class="accordion-body">

                            <!-- <div class="col" id="zones_search">
                                <form class="d-flex" role="search">
                                    <input class="form-control me-2" type="search" placeholder="Search Zones" aria-label="Search" style="min-width: 10em;">
                                    <button class="btn btn-outline-success" type="submit">Search</button>
                                </form>    
                            </div> -->
     
                            <table id="zone_table" class="col-12 table-striped table-hover table-bordered">
                                <thead>
                                    <tr id="zone_th">
                                        <th style="text-align: left;">Zone</th>
                                        <th style="text-align: left">Description</th>
                                    </tr>
                                </thead>
                                <tbody id="zone_tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div class="modal fade" id="zrEditModal" tabindex="-1" aria-labelledby="zrEditModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="zrEditModalLabel">Edit Resource Record</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="container-fluid">
                            <div class="row">
                                <div class="form-floating col-6">
                                    <input type="text" class="form-control form-control-sm pe-0" id="zrEditOwner" placeholder="www.">
                                    <label for="zrEditOwner" class="form-label ms-2">Owner</label>
                                </div>
                                <div id="zrEditOwnerZone" class="col-6 mt-auto ps-0" style="border: 0px red dashed;"></div>
                            </div>
                            <div class="mb-3 row"><div id="zrEditOwnerHelp" class="form-text col"></div></div>
                            <div class="mb-3 row">
                                <div class="form-floating col-md-7">
                                    <select class="form-select form-control form-control-sm" id="zrEditType" aria-label="Zone Record Type Select">
                                    </select>
                                    <label for="zrEditType" class="form-label ms-2">Type</label>
                                </div>
                                <div id="zrEditTypeRFCs" class="form-text col-md-5 mt-auto"></div>
                                <div id="zrEditTypeHelp" class="form-text col mt-auto"></div>
                            </div>
                            <div class="mb-3 row">
                                <div class="form-floating col-md-5">
                                    <input type="number" min="0" max="2147483647" step="3600" class="form-control form-control-sm" id="zrEditTtl" placeholder="">
                                    <label for="zrEditTtl" class="form-label ms-2">TTL</label>
                                </div>
                                <div id="zrEditTtlHelp" class="form-text"></div>
                            </div>
                            <div id="zrEditRdata" class="mb-3 col-md-12 mt-auto">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">🗑️</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary">Save</button>
                    </div>
                </div>
            </div>
        </div>

        <footer class="">
            <p class="" style="text-align: center; font-size: .7em;">version 3.0.0</p>
        </footer>

        <script>
        </script>
    </body>
</html>
